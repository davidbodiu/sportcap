    color: #fff;

  #chart-container {
    position: relative;
    width: 100%;
    max-width: 1100px;
  }

  .bar {

  }

  .bar-label {
    font-size: 12.5px;
    font-weight: 600;
    fill: #c8cdd5;
    dominant-baseline: middle;
    text-anchor: end;
  }

  .bar-value {
    font-size: 12px;
    font-weight: 700;
    fill: #fff;
    dominant-baseline: middle;
  }

  .grid-line {
    stroke: rgba(255,255,255,0.08);
    stroke-width: 1;
  }

  .axis-label {
    font-size: 11px;
    fill: rgba(255,255,255,0.35);
    text-anchor: middle;
    dominant-baseline: hanging;
  }

  #year-display {
    font-size: 7rem;
    font-weight: 800;
    color: rgba(255,255,255,0.07);
    position: absolute;
    right: 20px;
    bottom: 60px;
    pointer-events: none;
    z-index: 0;
    line-height: 1;
    letter-spacing: -0.02em;
  }

    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;

    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    margin-left: 8px;

    width: 90px;
    accent-color: #5a7aa8;
  }
  #speed-label {
    display: inline-block;
    min-width: 36px;
    text-align: right;

    border-radius: 5px;

    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;

    text-align: left;
    margin-top: 0px;
    padding-left: 180px;
  }

    margin-bottom: 8px;
    width: 100%;
    max-width: 1100px;
    padding-left: 180px;

    flex-shrink: 0;
  }

  const years = [...new Set(raw.map(d => d.year))].sort((a, b) => a - b);

  // Group by year
  const dataByYear = new Map();
  for (const y of years) {
    const entries = raw.filter(d => d.year === y)
      .sort((a, b) => b.value - a.value)
      .slice(0, TOP_N);
    dataByYear.set(y, entries);
  }

  // Build team metadata (league info persists across years)
  const teamMeta = new Map();
  raw.forEach(d => { if (!teamMeta.has(d.team)) teamMeta.set(d.team, d.league); });

  // SVG setup
  const chartHeight = (BAR_HEIGHT + BAR_PAD) * TOP_N + MARGIN.top + MARGIN.bottom;
  const svg = d3.select("#chart").attr("height", chartHeight);
  const containerWidth = document.getElementById("chart-container").clientWidth;
  const width = Math.min(containerWidth, 1100);
  const innerWidth = width - MARGIN.left - MARGIN.right;
  svg.attr("viewBox", `0 0 ${width} ${chartHeight}`);

  const g = svg.append("g").attr("transform", `translate(${MARGIN.left}, ${MARGIN.top})`);

  // Unit label (hidden on mobile)
  if (!isMobile) {
    g.append("text")
      .attr("x", 0).attr("y", -22)
      .attr("fill", "rgba(255,255,255,0.35)")
      .attr("font-size", "10px")
      .text("USDm");
  }

  // Scales
  const x = d3.scaleLinear().range([0, innerWidth]);
  const yPos = rank => rank * (BAR_HEIGHT + BAR_PAD);

  // Top axis + grid
  const axisGroup = g.append("g").attr("class", "axis-top");

  function updateAxis() {
    const ticks = x.ticks(5);
    const sel = axisGroup.selectAll(".grid-tick").data(ticks, d => d);
    const enter = sel.enter().append("g").attr("class", "grid-tick");
    enter.append("line").attr("class", "grid-line")
      .attr("y1", -8).attr("y2", (BAR_HEIGHT + BAR_PAD) * TOP_N);
    enter.append("text").attr("class", "axis-label").attr("y", -14);
    const merged = enter.merge(sel);
    merged.select("line").attr("x1", d => x(d)).attr("x2", d => x(d));
    merged.select("text").attr("x", d => x(d)).text(d => d3.format(",")(d));
    sel.exit().remove();
  }

  const yearDisplay = document.getElementById("year-display");
  const fmtVal = d => "$" + d3.format(",")(Math.round(d)) + "M";

  const SHORT_NAMES = {
    "Manchester United": "Man Utd",
    "Manchester City": "Man City",
    "Borussia Dortmund": "Dortmund",
    "Tottenham Hotspur": "Spurs",
    "Paris Saint-Germain": "PSG",
    "Atlético Madrid": "Atlético",
    "Newcastle United": "Newcastle",
    "West Ham United": "West Ham",
    "Internazionale": "Inter",
    "Leicester City": "Leicester",
    "Brighton & Hove Albion": "Brighton",
    "Crystal Palace": "C. Palace",
    "Seattle Sounders": "Seattle",
    "Atlanta United": "Atlanta",
    "Hamburger SV": "Hamburg",
    "Werder Bremen": "Bremen",
    "VfB Stuttgart": "Stuttgart",
  };
  function displayName(team) {
    return isMobile ? (SHORT_NAMES[team] || team) : team;
  }

  // Preload logos
  const allTeams = [...new Set(raw.map(d => d.team))];
  const logoAvailable = new Map();
  await Promise.all(allTeams.map(team =>
    new Promise(resolve => {
      const img = new Image();
      img.onload = () => { logoAvailable.set(team, true); resolve(); };
      img.onerror = () => { logoAvailable.set(team, false); resolve(); };
      img.src = logoUrl(team);
    })
  ));

  // ── Legend ──
  const legendEl = document.getElementById("legend");
  const leagueOrder = ["Premier League","La Liga","Bundesliga","Serie A","Ligue 1","MLS","Eredivisie","Scottish Premiership","Süper Lig","Brasileirão"];

  function updateLegend(frameData) {
    const counts = {};
    frameData.forEach(d => { counts[d.league] = (counts[d.league] || 0) + 1; });
    legendEl.innerHTML = leagueOrder
      .filter(l => counts[l])
      .map(l => `<span class="legend-item"><span class="legend-swatch" style="background:${LEAGUE_COLORS[l]}"></span>${l} <span class="legend-count">(${counts[l]})</span></span>`)
      .join("");
  }

  // ── Immediate-mode render: no D3 transitions, just set attributes directly ──
  function renderFrame(frameData) {
    // frameData: array of { team, league, value, rank }
    x.domain([0, d3.max(frameData, d => d.value) * 1.12]);
    updateAxis();

    const bars = g.selectAll(".bar").data(frameData, d => d.team);

    // ENTER
    const enter = bars.enter().append("g")
      .attr("class", "bar")
      .attr("transform", d => `translate(0, ${yPos(d.rank)})`);

    enter.append("rect")
      .attr("height", BAR_HEIGHT)
      .attr("rx", 2)
      .attr("fill", d => barColor(d.league));

    enter.each(function(d) {
      if (logoAvailable.get(d.team)) {
        d3.select(this).append("foreignObject")
          .attr("class", "logo-fo")
          .attr("width", LOGO_SIZE).attr("height", LOGO_SIZE)
          .attr("y", (BAR_HEIGHT - LOGO_SIZE) / 2)
          .append("xhtml:img")
          .attr("class", "logo-img")
          .attr("src", logoUrl(d.team))
          .attr("width", LOGO_SIZE).attr("height", LOGO_SIZE);
      }
    });

    enter.append("text")
      .attr("class", "bar-label")
      .attr("x", -10).attr("y", BAR_HEIGHT / 2)
      .text(d => displayName(d.team));

    enter.append("text")
      .attr("class", "bar-value")
      .attr("y", BAR_HEIGHT / 2);

    // MERGE
    const merged = enter.merge(bars);

    merged.attr("transform", d => `translate(0, ${yPos(d.rank)})`);
    merged.select("rect").attr("width", d => Math.max(0, x(d.value)));
    merged.select(".logo-fo").attr("x", d => x(d.value) + 6);
    merged.select(".bar-value")
      .attr("x", d => x(d.value) + (logoAvailable.get(d.team) ? LOGO_SIZE + 12 : 6))
      .text(d => fmtVal(d.value));

    // EXIT
    bars.exit().remove();

    updateLegend(frameData);
  }

  // ── Interpolation: build frame at time t between two year snapshots ──
  function interpolateFrame(fromData, toData, t) {
    // Map for quick lookup
    const fromMap = new Map(fromData.map(d => [d.team, d]));
    const toMap = new Map(toData.map(d => [d.team, d]));

    // The lowest value in the target year (exit target for departing teams)
    const toMinValue = d3.min(toData, d => d.value) * 0.5;

    // All teams present in either year
    const allTeams = new Set([...fromMap.keys(), ...toMap.keys()]);
    const interpolated = [];

    for (const team of allTeams) {
      const from = fromMap.get(team);
      const to = toMap.get(team);

      let value;
      if (from && to) {
        value = from.value + (to.value - from.value) * t;
      } else if (from && !to) {
        // Exiting: shrink toward min value
        value = from.value + (toMinValue - from.value) * t;
      } else {
        // Entering: grow from min value
        value = toMinValue + (to.value - toMinValue) * t;
      }

      const league = teamMeta.get(team);
      interpolated.push({ team, league, value });
    }

    // Sort by interpolated value descending to assign ranks
    interpolated.sort((a, b) => b.value - a.value);

    // Keep only top N and assign ranks
    const topN = interpolated.slice(0, TOP_N);
    topN.forEach((d, i) => d.rank = i);
    return topN;
  }

  // ── Single continuous rAF playback engine ──
  // progress: float from 0 to years.length-1
  //   integer part = "from" year index, fractional part = interpolation t
  let progress = 0;
  let playing = false;
  let rafId = null;
  let lastTimestamp = null;

  const BASE_DURATION = 7500;
  function getDuration() {
    return BASE_DURATION / +document.getElementById("speed").value;
  }

  // Populate year picker
  const yearPicker = document.getElementById("year-picker");
  years.forEach((y, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = y;
    yearPicker.appendChild(opt);
  });

  function renderAtProgress(p) {
    const maxP = years.length - 1;
    p = Math.max(0, Math.min(p, maxP));

    const fromIdx = Math.min(Math.floor(p), maxP - 1);
    const t = p - fromIdx;
    const toIdx = fromIdx + 1;

    // Show the year we're closest to
    const displayIdx = t < 0.5 ? fromIdx : toIdx;
    const displayYear = years[displayIdx];
    yearDisplay.textContent = displayYear;
    yearPicker.value = displayIdx;
    document.getElementById("title").textContent = `Forbes Top 20 Most Valuable Football Clubs (${displayYear})`;

    if (t === 0 || fromIdx === toIdx) {
      const data = dataByYear.get(years[fromIdx]);
      renderFrame(data.map((d, i) => ({ ...d, rank: i })));
    } else {
      const fromData = dataByYear.get(years[fromIdx]);
      const toData = dataByYear.get(years[toIdx]);
      renderFrame(interpolateFrame(fromData, toData, t));
    }
  }

  function tick(timestamp) {
    if (!lastTimestamp) lastTimestamp = timestamp;
    const delta = Math.min(timestamp - lastTimestamp, 50);
    lastTimestamp = timestamp;

    // Advance progress: delta ms / duration ms per year-segment
    const speed = getDuration();
    progress += delta / speed;

    if (progress >= years.length - 1) {
      progress = years.length - 1;
      renderAtProgress(progress);
      pause();
      return;
    }

    renderAtProgress(progress);
    rafId = requestAnimationFrame(tick);
  }

  function play() {
    if (playing) return;
    playing = true;
    lastTimestamp = null;
    const btn = document.getElementById("btn-play-pause");
    btn.innerHTML = "&#10074;&#10074; Pause";
    btn.classList.add("active");
    if (progress >= years.length - 1) progress = 0;
    rafId = requestAnimationFrame(tick);
  }

  function pause() {
    playing = false;
    lastTimestamp = null;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    const btn = document.getElementById("btn-play-pause");
    btn.innerHTML = "&#9654; Play";
    btn.classList.remove("active");
  }

  function reset() {
    pause();
    progress = 0;
    renderAtProgress(0);
  }

  document.getElementById("btn-play-pause").addEventListener("click", () => {
    playing ? pause() : play();
  });
  document.addEventListener("keydown", e => {
    if (e.code === "Space" && e.target === document.body) {
      e.preventDefault();
      playing ? pause() : play();
    }
  });
  document.getElementById("btn-reset").addEventListener("click", reset);
  document.getElementById("speed").addEventListener("input", function() {
    document.getElementById("speed-label").textContent = this.value + "x";
  });

  yearPicker.addEventListener("change", function() {
    pause();
    progress = +this.value;
    renderAtProgress(progress);
  });

  // Initial render
  renderAtProgress(0);
  setTimeout(play, 1200);
}

main();
</script>
</body>
</html>
