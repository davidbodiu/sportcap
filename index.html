<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles</title>
<link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #0b1628;
    color: #c8cdd5;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px 48px;
    flex: 1;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 48px;
  }
  .subtitle a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }
  .subtitle a:hover { color: rgba(255,255,255,0.55); }

  .card {
    display: block;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 28px 24px;
    margin-bottom: 16px;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .card-date {
    display: block;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
  }

  .card-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.06);
    padding: 3px 8px;
    border-radius: 3px;
    margin-right: 6px;
  }

  .card-link {
    float: right;
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    padding: 2px 0;
    transition: color 0.15s;
  }
  .card:hover .card-link { color: rgba(255,255,255,0.6); }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.2);
  }
  .footer a {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
  }

  @media (max-width: 600px) {
    .container { padding: 32px 16px 32px; }
    h1 { font-size: 1.5rem; }
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Articles</h1>
  <p class="subtitle">Data visualisations &amp; analysis &mdash; <a href="https://www.linkedin.com/in/bodiud/" target="_blank">Linkedin @david</a></p>

  <a href="article.html" class="card">
    <div class="card-title">The Evolution of Football Club Valuations (2007-2025)</div>
    <div class="card-desc">How $10 billion became $64 billion: Premier League dominance, state ownership, and the rise of MLS.</div>
    <span class="card-date">17 Mar 2026</span>
    <span class="card-tag">Article</span>
    <span class="card-tag">Bar Chart Race</span>
    <a href="race.html" class="card-link" onclick="event.stopPropagation()">Visualisation only &rarr;</a>
  </a>
</div>

</body>
</html>
